server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name localhost;

		root /var/www/html;
		index index.html;

        ssl_certificate		/etc/nginx/ssl/myhostname.crt;
        ssl_certificate_key	/etc/nginx/ssl/myhostname.key;

        ssl_protocols	TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;


        location / {

        }
}