version: '3.8'

services:
  mariadb:
    container_name: mariadb
    build: ./mariadb
    ports:
      - 3306:3306
  wordpress:
    container_name: wordpress
    build: ./wordpress
    ports:
      - 9000:9000
    volumes:
      - ./val-wordpress:/var/www/html/
    depends_on:
      - mariadb

  nginx:
    container_name: nginx
    build: ./nginx
    ports:
      - 80:80
      - 8080:8080
    depends_on:
      - mariadb
    volumes:
      - ./val-wordpress:/var/www/html/
      - ./val-adminer:/var/www2/html/

  # Bonus part
  adminer:
    container_name: adminer
    build: ./bonus/adminer
    ports:
      - 8000:8000
    volumes:
      - ./val-adminer:/var/www2/html/
    depends_on:
      - mariadb







