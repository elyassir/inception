version: '3.8'

services:
  wordpress:
    container_name: wordpress
    build: ./wordpress
    ports:
      - 9000:9000
    volumes:
      - ./val-wordpress:/var/www/html/
  nginx:
    container_name: nginx
    build: ./nginx
    ports:
      - 80:80
    depends_on:
      - wordpress
    volumes:
      - ./val-wordpress:/var/www/html/
  mariadb:
    container_name: mariadb
    build: ./mariadb
    ports:
      - 3306:3306
    depends_on:
      - wordpress






